<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Real-time Crowd Dashboard M4</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background: #f8fafc; padding: 20px; text-align: center; color: #1e293b; }
        .card-wrap { display: flex; gap: 20px; justify-content: center; margin-bottom: 25px; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); flex: 1; max-width: 400px; }
        .num { font-size: 5rem; font-weight: 800; margin: 10px 0; }
        .btn-box { margin-bottom: 30px; display: flex; gap: 12px; justify-content: center; }
        button { padding: 12px 24px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; color: white; }
        button:hover { filter: brightness(0.9); transform: translateY(-1px); }
        .st { background: #10b981; } .sp { background: #ef4444; }
        .rs { background: #f59e0b; color: white; } .ex { background: #3b82f6; }
        .chart-card { background: white; padding: 20px; border-radius: 16px; max-width: 1000px; margin: 0 auto; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <h1>📊 แดชบอร์ดวิเคราะห์จำนวนผู้ร่วมงาน</h1>

    <div class="card-wrap">
        <div class="card">
            <div>กำลังนับได้ (คน)</div>
            <div class="num" id="cVal" style="color: #3b82f6;">0</div>
        </div>
        <div class="card">
            <div>ยอดสะสมทั้งหมด (คน)</div>
            <div class="num" id="aVal" style="color: #10b981;">0</div>
        </div>
    </div>

    <div class="btn-box">
        <button class="st" id="start">▶ เริ่มนับ</button>
        <button class="sp" id="stop">⏸ หยุดชั่วคราว</button>
        <button class="rs" id="reset">🔄 รีเซ็ตค่าเป็น 0</button>
        <button class="ex" id="export">📥 ส่งออก Excel</button>
    </div>

    <div class="chart-card">
        <canvas id="myChart"></canvas>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, remove, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBrWpNgTQ2JD8Eo1qAde_AQeCv4MlaUylE",
        authDomain: "suchartwork-1487382986748.firebaseapp.com",
        databaseURL: "https://suchartwork-1487382986748.firebaseio.com",
        projectId: "suchartwork-1487382986748",
        appId: "1:353884592527:web:c0847e6fdd80d503eb13fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ดึงค่ามาแสดง
    onValue(ref(db, 'dashboard/current'), s => document.getElementById('cVal').innerText = s.val() || 0);
    onValue(ref(db, 'dashboard/accumulated'), s => document.getElementById('aVal').innerText = s.val() || 0);

    // ปุ่มควบคุม
    document.getElementById('start').onclick = () => set(ref(db, 'dashboard/control/status'), 'run');
    document.getElementById('stop').onclick = () => set(ref(db, 'dashboard/control/status'), 'stop');
    
    // แก้ไขฟังก์ชัน Reset: ต้อง set เป็น 0 เท่านั้น เพื่อให้ Python ตรวจเจอ
    document.getElementById('reset').onclick = () => {
        if(confirm("ยืนยันการล้างข้อมูลประวัติและเริ่มนับใหม่จาก 0?")) {
            remove(ref(db, 'dashboard/history_minute')); // ลบกราฟ
            set(ref(db, 'dashboard/accumulated'), 0); // ตั้งค่า 0 เพื่อแจ้ง Python
            set(ref(db, 'dashboard/current'), 0);
            set(ref(db, 'dashboard/control/status'), 'run');
            alert("ระบบกำลังล้างข้อมูลในเครื่อง Mac... กรุณารอสักครู่");
        }
    };

    // ส่งออก Excel
    document.getElementById('export').onclick = async () => {
        const snap = await get(ref(db, 'dashboard/history_minute'));
        if(!snap.exists()) return alert("ไม่มีข้อมูล");
        const rows = Object.keys(snap.val()).map(k => ({ "เวลา": k, "จำนวนคน": snap.val()[k].count, "ยอดสะสม": snap.val()[k].accumulated }));
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Report");
        XLSX.writeFile(wb, `Report_${new Date().getTime()}.xlsx`);
    };

    // วาดกราฟ
    const ctx = document.getElementById('myChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'จำนวนคนต่อนาที', data: [], borderColor: '#3b82f6', fill: true, backgroundColor: 'rgba(59, 130, 246, 0.1)' }] }
    });

    onValue(ref(db, 'dashboard/history_minute'), snap => {
        const data = snap.val();
        if(data) {
            const keys = Object.keys(data).sort().slice(-40);
            chart.data.labels = keys.map(k => k.substring(11, 13) + ":" + k.substring(13, 15));
            chart.data.datasets[0].data = keys.map(k => data[k].count);
            chart.update();
        } else {
            chart.data.labels = []; chart.data.datasets[0].data = []; chart.update();
        }
    });
</script>
</body>
</html>
