<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Dashboard ควบคุมระบบนับคน</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; padding: 20px; text-align: center; }
        .card-group { display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex: 1; }
        .value { font-size: 5rem; font-weight: bold; margin: 10px 0; }
        .btn-group { margin: 20px 0; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        button { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.1rem; color: white; transition: 0.3s; }
        .start { background: #28a745; } .stop { background: #dc3545; }
        .reset { background: #ffc107; color: black; } .export { background: #17a2b8; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        .chart-box { background: white; padding: 20px; border-radius: 15px; max-width: 1100px; margin: 0 auto; }
    </style>
</head>
<body>

    <h1>📊 ระบบวิเคราะห์ฝูงชน (Real-time)</h1>

    <div class="card-group">
        <div class="card">
            <div>พบขณะนี้</div>
            <div class="value" id="cur" style="color: #007bff;">0</div>
        </div>
        <div class="card">
            <div>ยอดสะสมทั้งหมด</div>
            <div class="value" id="acc" style="color: #28a745;">0</div>
        </div>
    </div>

    <div class="btn-group">
        <button class="start" id="bStart">▶ เริ่มทำงาน</button>
        <button class="stop" id="bStop">⏸ หยุดชั่วคราว</button>
        <button class="reset" id="bReset">🔄 ล้างข้อมูล/เริ่มใหม่</button>
        <button class="export" id="bExport">📥 ส่งออก Excel</button>
    </div>

    <div class="chart-box">
        <canvas id="chart"></canvas>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, remove, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const config = {
        apiKey: "AIzaSyBrWpNgTQ2JD8Eo1qAde_AQeCv4MlaUylE",
        authDomain: "suchartwork-1487382986748.firebaseapp.com",
        databaseURL: "https://suchartwork-1487382986748.firebaseio.com",
        projectId: "suchartwork-1487382986748",
        appId: "1:353884592527:web:c0847e6fdd80d503eb13fa"
    };

    const app = initializeApp(config);
    const db = getDatabase(app);

    // อัปเดต UI Real-time
    onValue(ref(db, 'dashboard/current'), s => document.getElementById('cur').innerText = s.val() || 0);
    onValue(ref(db, 'dashboard/accumulated'), s => document.getElementById('acc').innerText = s.val() || 0);

    // ปุ่มควบคุม
    document.getElementById('bStart').onclick = () => set(ref(db, 'dashboard/control/status'), 'run');
    document.getElementById('bStop').onclick = () => set(ref(db, 'dashboard/control/status'), 'stop');
    
    document.getElementById('bReset').onclick = () => {
        if(confirm("ยืนยันการลบข้อมูลประวัติและเริ่มนับใหม่จาก 0?")) {
            remove(ref(db, 'dashboard/history_minute'));
            set(ref(db, 'dashboard/accumulated'), 0);
            set(ref(db, 'dashboard/current'), 0);
            alert("รีเซ็ตระบบเรียบร้อย");
        }
    };

    document.getElementById('bExport').onclick = async () => {
        const snap = await get(ref(db, 'dashboard/history_minute'));
        if(!snap.exists()) return alert("ยังไม่มีข้อมูลให้ส่งออก");
        const rows = Object.keys(snap.val()).map(k => ({ "เวลา": k, "จำนวนคน": snap.val()[k].count, "ยอดสะสม": snap.val()[k].accumulated }));
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Report");
        XLSX.writeFile(wb, `CrowdReport_${new Date().getTime()}.xlsx`);
    };

    // กราฟ
    const ctx = document.getElementById('chart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'จำนวนคนรายนาที', data: [], borderColor: '#007bff', fill: true, backgroundColor: 'rgba(0,123,255,0.1)' }] }
    });

    onValue(ref(db, 'dashboard/history_minute'), snap => {
        const data = snap.val();
        if(data) {
            const keys = Object.keys(data).sort().slice(-30);
            chart.data.labels = keys.map(k => k.substring(11, 13) + ":" + k.substring(13, 15));
            chart.data.datasets[0].data = keys.map(k => data[k].count);
            chart.update();
        }
    });
</script>
</body>
</html>
