<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Advanced Crowd Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* เพิ่มสไตล์ปุ่ม */
        .btn-group { margin: 20px 0; display: flex; gap: 10px; justify-content: center; }
        button { padding: 10px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; color: white; }
        .btn-stop { background: #dc3545; }
        .btn-start { background: #28a745; }
        .btn-reset { background: #ffc107; color: black; }
        .btn-export { background: #17a2b8; }
    </style>
</head>
<body>
    <div class="btn-group">
        <button class="btn-start" id="btnStart">เริ่มการทำงาน</button>
        <button class="btn-stop" id="btnStop">หยุดชั่วคราว</button>
        <button class="btn-reset" id="btnReset">รีเซ็ตค่าทั้งหมด</button>
        <button class="btn-export" id="btnExport">ส่งออกเป็น Excel</button>
    </div>

    <script type="module">
    // ... (Import และ Firebase Config ของคุณเหมือนเดิม) ...
    import { getDatabase, ref, set, remove, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
    const db = getDatabase(app);

    // 1. ระบบควบคุม Stop / Start
    document.getElementById('btnStart').onclick = () => set(ref(db, 'dashboard/control/status'), 'run');
    document.getElementById('btnStop').onclick = () => set(ref(db, 'dashboard/control/status'), 'stop');

    // 2. ระบบ Reset ค่าในฐานข้อมูล
    document.getElementById('btnReset').onclick = () => {
        if(confirm("ยืนยันการลบข้อมูลทั้งหมด? ยอดสะสมจะเริ่มที่ 0 ใหม่")) {
            remove(ref(db, 'dashboard')); // ลบข้อมูลทั้งหมดภายใต้ path dashboard
            set(ref(db, 'dashboard/control/status'), 'run'); // ตั้งสถานะให้รันต่อ
            location.reload(); // รีโหลดหน้าเว็บ
        }
    };

    // 3. ระบบส่งออกไฟล์ Excel
    document.getElementById('btnExport').onclick = async () => {
        const snapshot = await get(ref(db, 'dashboard/history_minute'));
        const data = snapshot.val();
        if(!data) return alert("ไม่มีข้อมูลให้ส่งออก");

        // แปลงข้อมูลจาก Firebase เป็นรูปแบบตารางสำหรับ Excel
        const rows = Object.keys(data).map(key => ({
            "วัน-เวลา": key,
            "จำนวนคน (ขณะนั้น)": data[key].count,
            "ยอดสะสม": data[key].accumulated,
            "Timestamp": data[key].timestamp
        }));

        const worksheet = XLSX.utils.json_to_sheet(rows);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Crowd Data");
        XLSX.writeFile(workbook, `Crowd_Report_${new Date().getTime()}.xlsx`);
    };
</script>
</body>
</html>
